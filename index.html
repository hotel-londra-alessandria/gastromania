<style>
  :root {
    --bg: #0e0c09;
    --surface: #1a1712;
    --border: #2e2a22;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f0e6cc;
    --muted: #7a7060;

    --ristoranti: #7bc8a4;
    --pizza: #f4907a;
    --pasticcerie: #b89fd4;
    --gelati: #7ec8e3;
    --vino: #e8849a;
    --birra: #f5d080;
    --caffe: #7aaed6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 58px;
    flex-shrink: 0;
    position: relative;
    z-index: 1000;
  }

  .brand {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand-city {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .brand-tagline {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 6px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 4px 0;
    align-items: center;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .filter-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn.active {
    border-color: currentColor;
    color: var(--cream);
    background: rgba(255,255,255,0.05);
  }
  .filter-btn:hover { opacity: 0.85; }

  .filter-btn.all { color: var(--gold); }
  .filter-btn.all.active { border-color: var(--gold); background: rgba(201,168,76,0.1); }

  .count-badge {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 400;
  }

  /* LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* MAP */
  #map {
    flex: 1;
    background: #1a1812;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 500;
  }
  .sidebar-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .place-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .place-list::-webkit-scrollbar { width: 3px; }
  .place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .place-item {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(46,42,34,0.5);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .place-item:hover { background: rgba(255,255,255,0.04); }
  .place-item.highlighted { background: rgba(201,168,76,0.08); }

  .place-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .place-name {
    font-size: 12px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.3;
    flex: 1;
  }
  .place-cat {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
    min-width: 180px;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-close-button { color: var(--muted) !important; top: 8px !important; right: 10px !important; font-size: 16px !important; }

  .popup-inner {
    padding: 14px 16px 12px;
  }
  .popup-cat {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 5px;
  }
  .popup-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .popup-desc {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
  .popup-desc a { color: var(--gold); text-decoration: none; }
  .popup-desc a:hover { text-decoration: underline; }

  .leaflet-div-icon { background: none !important; border: none !important; box-shadow: none !important; }
  .leaflet-marker-shadow { display: none !important; }
  .leaflet-tile { filter: brightness(1) saturate(0.85); }

  /* footer */
  footer {
    height: 26px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 16px;
    flex-shrink: 0;
  }
  footer span {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  footer span em { color: var(--gold); font-style: normal; }
</style>
</head>

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'topleft' }).addTo(map);

// Build markers
const markers = [];
const layerGroups = {};
Object.keys(CAT_COLORS).forEach(c => layerGroups[c] = L.layerGroup().addTo(map));

const CAT_ICONS = {
  RISTORANTI: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M11 3v7a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V3" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M6.5 3v18M15 3c0 0 3 2 3 6s-3 6-3 6v6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`,
  PIZZA: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2L2 19h20L12 2z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="12" cy="13" r="1.5" fill="white"/>
    <circle cx="9" cy="16" r="1" fill="white"/>
    <circle cx="15" cy="16" r="1" fill="white"/>
  </svg>`,
  PASTICCERIE: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="3" y="11" width="18" height="10" rx="2" stroke="white" stroke-width="2"/>
    <path d="M7 11V8a5 5 0 0 1 10 0v3" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M3 15h18" stroke="white" stroke-width="1.5"/>
    <path d="M12 7v4M9 9l3-2 3 2" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`,
  GELATI: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 22l4-8H8l4 8z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M8 14a4 4 0 1 1 8 0" stroke="white" stroke-width="2"/>
    <circle cx="12" cy="8" r="4" stroke="white" stroke-width="2"/>
  </svg>`,
  VINO: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M8 3h8l1 7a5 5 0 0 1-10 0L8 3z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M12 15v6M9 21h6" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>`,
  BIRRA: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 3h10l2 18H4L6 3z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M18 8h2a2 2 0 0 1 0 4h-2" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M8 9h6M8 13h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`,
  CAFFE: `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 3h10l-2 12H8L6 3z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
    <path d="M16 7h2a2 2 0 0 1 0 4h-2" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <path d="M4 17h14M7 20h8" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </svg>`,
};

function makeIcon(color, cat) {
  const svg = CAT_ICONS[cat] || CAT_ICONS.RISTORANTI;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;
      background:${color};
      border-radius:50%;
      border:2px solid white;
      display:flex;align-items:center;justify-content:center;
      padding:5px;
    ">${svg}</div>`,
    iconSize: [28,28],
    iconAnchor: [14,14],
    popupAnchor: [0,-16],
  });
}

PLACES.forEach((p, i) => {
  const color = CAT_COLORS[p.cat];
  const marker = L.marker([p.lat, p.lng], { icon: makeIcon(color, p.cat) });

  const descHtml = p.desc
    ? `<div class="popup-desc">${p.desc.replace(/(https?:\/\/\S+|www\.\S+)/g, u => `<a href="${u.startsWith('http')?u:'https://'+u}" target="_blank">${u}</a>`)}</div>`
    : '';

  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-cat" style="color:${color}">${CAT_LABELS_SHORT[p.cat]}</div>
      <div class="popup-name">${p.name}</div>
      ${descHtml}
    </div>
  `, { maxWidth: 240, className: '' });

  marker.on('click', () => highlightItem(i));
  layerGroups[p.cat].addLayer(marker);
  markers.push({ marker, data: p, index: i });
});

// Sidebar
function buildList(filter) {
  const list = document.getElementById('place-list');
  list.innerHTML = '';
  const filtered = filter === 'all'
    ? PLACES
    : PLACES.filter(p => p.cat === filter);

  document.getElementById('sidebar-count').textContent = `${filtered.length} local${filtered.length !== 1 ? 'i' : 'e'}`;

  const allItems = [];
  filtered.forEach((p, localIndex) => {
    const globalIndex = PLACES.indexOf(p);
    const color = CAT_COLORS[p.cat];
    const item = document.createElement('div');
    item.className = 'place-item';
    item.id = `item-${globalIndex}`;
    item.innerHTML = `
      <div class="place-dot" style="background:${color}"></div>
      <div>
        <div class="place-name">${p.name}</div>
        ${filter === 'all' ? `<div class="place-cat">${CAT_LABELS_SHORT[p.cat]}</div>` : ''}
      </div>
    `;
    item.addEventListener('click', () => {
      map.setView([p.lat, p.lng], 17, {animate:true});
      markers[globalIndex].marker.openPopup();
      highlightItem(globalIndex);
    });
    list.appendChild(item);
    allItems.push(item);
  });
}

function highlightItem(globalIndex) {
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('highlighted'));
  const el = document.getElementById(`item-${globalIndex}`);
  if (el) {
    el.classList.add('highlighted');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// Counts
const counts = {};
Object.keys(CAT_COLORS).forEach(c => counts[c] = 0);
PLACES.forEach(p => counts[p.cat]++);
document.getElementById('cnt-all').textContent = PLACES.length;
Object.keys(counts).forEach(c => {
  const el = document.getElementById('cnt-' + c);
  if (el) el.textContent = counts[c];
});

// Filter logic
const activeFilters = new Set(Object.keys(CAT_COLORS));
let currentSidebarCat = 'all';

function filterCat(cat, btn) {
  if (cat === 'all') {
    // Toggle: if all active → deactivate all except click → or activate all
    const allActive = activeFilters.size === Object.keys(CAT_COLORS).length;
    if (allActive) {
      // nothing to do – clicking "tutti" when all are on is a no-op or reset
      return;
    }
    // Activate all
    activeFilters.clear();
    Object.keys(CAT_COLORS).forEach(c => activeFilters.add(c));
    document.querySelectorAll('.filter-btn:not(.all)').forEach(b => b.classList.add('active'));
    btn.classList.add('active');
  } else {
    if (activeFilters.has(cat)) {
      activeFilters.delete(cat);
      btn.classList.remove('active');
      layerGroups[cat].remove();
    } else {
      activeFilters.add(cat);
      btn.classList.add('active');
      layerGroups[cat].addTo(map);
    }
    const allBtn = document.querySelector('.filter-btn.all');
    if (activeFilters.size === Object.keys(CAT_COLORS).length) {
      allBtn.classList.add('active');
    } else {
      allBtn.classList.remove('active');
    }
  }

  // Rebuild sidebar showing only active cats
  const listFilter = activeFilters.size === 1 ? [...activeFilters][0] : 'all';
  buildList(activeFilters.size === Object.keys(CAT_COLORS).length ? 'all' : listFilter);
}

// Init
buildList('all');
</script>
</body>
</html>
